<!DOCTYPE html>
<html>
<head>
  <title>Fun Question 🎉</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      margin: 0;
      padding-top: 100px;
      overflow: hidden;
    }

    h1 {
      color: red; /* Heading in red */
      font-size: 40px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      color: white;
    }

    #yes {
      background-color: red; /* Yes button in green */
    }

    #no {
      position: absolute;
      background-color: orange; /* No button in orange */
    }

    #message {
      margin-top: 30px;
      font-size: 26px;
      color: white;
      font-weight: bold;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: red;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity:1; }
      100% { transform: translateY(-100vh); opacity:0; }
    }
  </style>
</head>

<body>

<h1>Motti, I have a question for you… Are you really Motti? 😜</h1>

<button id="yes" onclick="yesClick()">Yes 😆</button>
<button id="no" onmouseover="moveButton()">No 😂</button>

<h2 id="message"></h2>

<script>
function yesClick() {
  document.getElementById("message").innerHTML =
    "Congrats! From today, you are Motti! 😎";

  // Start confetti and floating hearts
  startConfetti();
  createHearts();
}

function moveButton() {
  var x = Math.random() * (window.innerWidth - 100);
  var y = Math.random() * (window.innerHeight - 50);
  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

// Floating hearts
function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (10 + Math.random() * 30) + "px";
    heart.innerHTML = "❤️";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

// Simple confetti effect
function startConfetti() {
  const colors = ["#ff4d6d", "#ffb6c1", "#fff", "#ffc0cb"];
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement("div");
    confetti.style.position = "absolute";
    confetti.style.width = "10px";
    confetti.style.height = "10px";
    confetti.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    confetti.style.left = Math.random()*window.innerWidth + "px";
    confetti.style.top = Math.random()*window.innerHeight + "px";
    confetti.style.opacity = Math.random();
    confetti.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 3000);
  }
}
</script>

</body>
</html>
